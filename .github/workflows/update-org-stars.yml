name: Update GVCLab total stars

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  update-stars:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate org stars JSON
        env:
          ORG_NAME: GVCLab
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone

          org = os.environ.get("ORG_NAME", "GVCLab")
          token = os.environ.get("GITHUB_TOKEN", "")

          headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": "org-stars-badge-generator"
          }
          if token:
              headers["Authorization"] = f"Bearer {token}"

          total_stars = 0
          total_repos = 0
          page = 1

          while True:
              url = f"https://api.github.com/orgs/{org}/repos?type=public&per_page=100&page={page}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  repos = json.load(resp)

              if not repos:
                  break

              for repo in repos:
                  if repo.get("fork"):
                      continue
                  total_stars += int(repo.get("stargazers_count", 0))
                  total_repos += 1

              if len(repos) < 100:
                  break
              page += 1

          output = {
              "org": org,
              "stars": total_stars,
              "repos": total_repos,
              "updated_at": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
          }

          os.makedirs("data", exist_ok=True)
          with open("data/org-stars.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
              f.write("\n")

          print(json.dumps(output, ensure_ascii=False, indent=2))
          PY

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/org-stars.json
          git diff --cached --quiet || git commit -m "chore: update org stars"
          git push
